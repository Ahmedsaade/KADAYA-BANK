<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحان القضايا المجتمعية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --secondary: #c8a84b;
    --accent: #e74c3c;
    --success: #27ae60;
    --wrong: #e74c3c;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a2a3a;
    --muted: #6b7c93;
    --border: #dde4ec;
    --shadow: 0 4px 20px rgba(26,58,92,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #0d2240 100%);
    color: white;
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(200,168,75,0.15);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 250px; height: 250px;
    background: rgba(200,168,75,0.08);
    border-radius: 50%;
  }
  .header h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }
  .header p {
    font-size: 1rem;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
    position: relative;
    z-index: 1;
  }
  .gold-line {
    width: 80px;
    height: 4px;
    background: var(--secondary);
    margin: 14px auto 0;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  /* Progress */
  .progress-bar-wrap {
    background: white;
    padding: 14px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary), var(--primary));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 600;
  }

  /* Chapter nav */
  .chapter-nav {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 16px 24px;
    background: white;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .chapter-nav::-webkit-scrollbar { display: none; }
  .ch-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: white;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .ch-btn:hover { border-color: var(--primary); color: var(--primary); }
  .ch-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Main */
  .main { max-width: 860px; margin: 0 auto; padding: 28px 16px 40px; }

  /* Chapter section */
  .chapter-section { display: none; }
  .chapter-section.active { display: block; }

  .chapter-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .chapter-title .badge {
    background: var(--primary);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 12px;
  }
  .chapter-title h2 {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--primary);
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    border: 2px solid transparent;
    transition: border-color 0.3s, transform 0.2s;
    overflow: hidden;
  }
  .q-card:hover { transform: translateY(-1px); }
  .q-card.correct { border-color: var(--success); }
  .q-card.wrong { border-color: var(--wrong); }

  .q-header {
    padding: 16px 20px 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .q-num {
    background: var(--primary);
    color: white;
    font-size: 0.78rem;
    font-weight: 700;
    min-width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 0.97rem;
    font-weight: 600;
    line-height: 1.65;
    color: var(--text);
  }

  /* TF options */
  .tf-options {
    display: flex;
    gap: 10px;
    padding: 0 20px 16px;
  }
  .tf-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tf-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: #f0f4f8; }
  .tf-btn.selected-correct { background: #e8f8ee; border-color: var(--success); color: var(--success); }
  .tf-btn.selected-wrong { background: #fde8e8; border-color: var(--wrong); color: var(--wrong); }
  .tf-btn.show-correct { background: #e8f8ee; border-color: var(--success); color: var(--success); }
  .tf-btn:disabled { cursor: default; }

  /* MCQ options */
  .mcq-options {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mcq-btn {
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mcq-btn:hover:not(:disabled) { border-color: var(--primary); background: #f0f4f8; }
  .mcq-btn .opt-label {
    min-width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--bg);
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--primary);
  }
  .mcq-btn.selected-correct { background: #e8f8ee; border-color: var(--success); color: var(--success); }
  .mcq-btn.selected-correct .opt-label { background: var(--success); color: white; }
  .mcq-btn.selected-wrong { background: #fde8e8; border-color: var(--wrong); color: var(--wrong); }
  .mcq-btn.selected-wrong .opt-label { background: var(--wrong); color: white; }
  .mcq-btn.show-correct { background: #e8f8ee; border-color: var(--success); color: var(--success); }
  .mcq-btn.show-correct .opt-label { background: var(--success); color: white; }
  .mcq-btn:disabled { cursor: default; }

  /* Result badge */
  .result-badge {
    display: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 700;
    margin: 0 20px 14px;
    align-items: center;
    gap: 6px;
  }
  .result-badge.show { display: flex; }
  .result-badge.correct { background: #e8f8ee; color: var(--success); }
  .result-badge.wrong { background: #fde8e8; color: var(--wrong); }

  /* Score summary */
  .score-summary {
    background: linear-gradient(135deg, var(--primary), #0d2240);
    color: white;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 28px;
    text-align: center;
    display: none;
  }
  .score-summary.show { display: block; }
  .score-big {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--secondary);
    line-height: 1;
  }
  .score-label { font-size: 1.1rem; margin-top: 6px; opacity: 0.85; }
  .score-grade {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 12px;
    color: var(--secondary);
  }

  /* Bottom controls */
  .chapter-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-primary {
    padding: 12px 28px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: #0d2240; transform: translateY(-1px); }
  .btn-secondary {
    padding: 12px 28px;
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--primary); color: white; }
  .btn-gold {
    padding: 12px 28px;
    background: var(--secondary);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-gold:hover { background: #b8943a; }

  .chapter-score-mini {
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 600;
  }

  .shuffle-btn { border-color: var(--secondary) !important; color: var(--secondary) !important; font-weight: 800; }
  .shuffle-btn.active { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }

  .shuffle-header {
    background: linear-gradient(135deg, #c8a84b, #a87c2a);
    color: white;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .shuffle-header-text h2 { font-size: 1.2rem; font-weight: 800; }
  .shuffle-header-text p { font-size: 0.88rem; opacity: 0.85; margin-top: 4px; }
  .btn-reshuffle {
    padding: 10px 22px;
    background: white;
    color: var(--secondary);
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-reshuffle:hover { background: #fff8e8; transform: scale(1.04); }
  .q-source-tag {
    font-size: 0.72rem;
    color: var(--secondary);
    font-weight: 700;
    padding: 2px 8px;
    background: #fff8e8;
    border-radius: 6px;
    margin-left: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.4rem; }
    .q-text { font-size: 0.9rem; }
    .tf-btn { font-size: 0.82rem; }
    .score-big { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎓  القضايا المجتمعية</h1>
  <p></p>
  <div class="gold-line"></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<div class="chapter-nav">
  <button class="ch-btn active" onclick="showChapter(0)">الفصل الأول: الزيادة السكانية</button>
  <button class="ch-btn" onclick="showChapter(1)">الفصل الثاني: حقوق الإنسان</button>
  <button class="ch-btn" onclick="showChapter(2)">الفصل الثالث: الشفافية ومكافحة الفساد</button>
  <button class="ch-btn" onclick="showChapter(3)">الفصل الرابع: سماحة الأديان</button>
  <button class="ch-btn" onclick="showChapter(4)">الفصل الخامس: تشريعات حماية البيئة</button>
  <button class="ch-btn" onclick="showChapter(5)">أسئلة البيئة (اختيار من متعدد)</button>
  <button class="ch-btn" onclick="showChapter(6)">الكوارث الطبيعية</button>
  <button class="ch-btn shuffle-btn" onclick="showChapter(7)">🔀 كل الأسئلة مخلوطة</button>
</div>

<div class="main" id="mainContent"></div>

<script>
// ========== DATA ==========

const chapters = [

// ===== Chapter 0: الزيادة السكانية =====
{
  title: "الفصل الأول: الزيادة السكانية في مصر",
  type: "tf",
  questions: [
    { q: "بلغ عدد سكان مصر 100 مليون نسمه تقريبا عام ٢٠٢٠.", ans: true },
    { q: "من العادات الاجتماعية خاصه فى الريف تفضيل المولود الذكر مما يدعو إلى تكرار الحمل والولادة على أمل ميلاد الذكر.", ans: true },
    { q: "مشكلة مصر السكانية وأغلب الدول النامية لها ثلاث أبعاد: النمو السريع للسكان، سوء التوزيع الجغرافي للسكان، ثم انخفاض خصائص السكان التعليمية والصحية والعمرية والفقر.", ans: true },
    { q: "حصه مصر من مياه النيل سنويا تبلغ 100 مليار متر مكعب.", ans: false },
    { q: "الزواج المبكر والإنجاب المبكر للإناث خاصه فى الريف لا يساعد على الزيادة السكانية.", ans: false },
    { q: "الزيادة السكانية فى مصر ترجع فى الأساس إلى زياده عدد المواليد وتناقص عدد الوفيات.", ans: true },
    { q: "من المتوقع أن يصل عدد سكان مصر إلى ١٤٠ مليون نسمه عام ٢٠٥٠.", ans: true },
    { q: "عدم الفهم الصحيح للدين يجعل البعض خاصه فى الريف ينظر إلى تنظيم الأسرة بعين الريب والحرماني.", ans: true },
    { q: "تحتل مصر المرتبة السادسة عشر بين دول العالم من حيث عدد السكان.", ans: true },
    { q: "بينما توضح الدراسات إن الحد الأدنى لنصيب الفرد من المياه يجب ألا يقل عن 1000 متر مكعب إلا إن نصيب الفرد من المياه فى مصر لا يزيد عن 600 متر مكعب مما يجعل مصر من دول الفقر المائي.", ans: true },
    { q: "الزيادة السكانية = عدد المواليد + عدد الوفيات – المهاجرين.", ans: false },
    { q: "تحتل مصر المرتب الأولى عربيا من حيث عدد السكان.", ans: true },
    { q: "لمواجهه الزيادة السكانية وتداعياتها يجب ان تعمل الحكومة على محورين أساسيين فى نفس الوقت: المحور الأول وضع سياسات واستراتيجيات سكانيه للتحكم فى النمو السكاني، والمحور الثاني وضع سياسات واستراتيجيات تنموية لاستيعاب ومقابله احتياجات الزيادة السكانية المستمرة.", ans: true },
    { q: "تناول دستور مصر ٢٠١٧ الزيادة السكانية حيث يطالب الحكومة بوضع خطط وبرامج سكانيه تهدف إلى تحقيق التوازن بين معدلات النمو السكاني والموارد الاقتصادية المتاحة.", ans: true },
    { q: "نسبه سكان المناطق الريفية تبلغ ٧٠ ٪ من إجمالي سكان مصر.", ans: false },
    { q: "التعداد العام للسكان والذى تجريه الدولة كل ١٠ سنوات هو المصدر الأساسي للتعرف على عدد سكان الدولة.", ans: true },
    { q: "للجمعيات الأهلية والقطاع الخاص دور فى الاستراتيجيات السكانية وتنفيذها.", ans: true },
    { q: "تعتبر محافظه الإسكندرية اكبر محافظه مصريه من حيث عدد السكان.", ans: false },
    { q: "بالرغم من إن مساحه مصر الكلية حوالى مليون كيلو متر مربع إلا أن المساحة المأهولة بالسكان لا تزيد عن ٧٪ تقريبا.", ans: true },
    { q: "سكان كل من محافظه القاهرة ومحافظه الجيزه ومحافظه القليوبيه يمثلون ١٠٪ من سكان الجمهورية فقط البالغ حجمه 100 مليون نسمه.", ans: false },
    { q: "هناك فجوه غذائية تجعل مصر تستورد ٨٠٪ من احتياجاتها الغذائية.", ans: true },
    { q: "مصر تعتبر واحده من أكبر ٣ دول استيرادا للقمح.", ans: true },
    { q: "الفقر أحد الاسباب الهامه لزياده الطلب على الإنجاب حتى يستطيع مساعدة العائلة عند الكبر فى السن.", ans: true },
    { q: "البطالة لا تعتبر من تداعيات وآثار الزيادة السكانية.", ans: false },
    { q: "معدل المواليد هو عدد المواليد لكل ١٠٠٠ من السكان.", ans: true },
    { q: "الأميه تعتبر أحد تداعيات الزيادة السكانية.", ans: true },
    { q: "مصر أكبر دوله افريقيا من حيث عدد السكان.", ans: false },
    { q: "محدودية المياه تعنى محدودية الأمن الغذائي.", ans: true },
    { q: "الزيادة الطبيعية للسكان هو الفرق بين عدد المواليد وعدد الوفيات لكل ١٠٠٠ من السكان.", ans: true },
    { q: "التيار المتحفظ فى المجتمع يشجع على زياده الإنجاب.", ans: true },
    { q: "المشكلة السكانية فى مصر أصبحت مشكله أمن قومي.", ans: true },
    { q: "العادات والتقاليد فى المجتمع ومنها النظرة إلى أن زياده الإنجاب تعتبر صمام أمان للمرأة – خاصه فى الريف – يجنبها خطر الطلاق أو الزواج بأخرى.", ans: true },
    { q: "توضح الدراسات والبحوث إنه لا يوجد ارتباط بين زياده الإنجاب والأميه.", ans: false },
    { q: "نسبه الإناث فى المجتمع أعلى من نسبه الذكور.", ans: false },
    { q: "سكان مصر يذيدون بمقدار ٢ مليون نسمه سنويا.", ans: true },
    { q: "معدل وفيات الأطفال الرضع (أقل من سنه فى العمر) وعدد وفيات الاطفال الرضع لكل ١٠٠٠ من السكان يعتبر مقياس للحالة الصحية في المجتمع.", ans: true },
    { q: "نسبه الأطفال فى المجتمع (أقل من ١٥ سنه) تمثل ثلث حجم السكان.", ans: true },
    { q: "ظاهره أطفال الشوارع وتزايدها لا علاقه لها بالنمو السكاني.", ans: false },
    { q: "تلوث البيئة (بالإضافة إلى عوامل اخرى) ترجع إلى النمو السكاني المتزايد.", ans: true },
    { q: "الفقر والجوع والمرض من تداعيات الزيادة السكانية.", ans: true },
    { q: "المناطق الريفية أقل إنجابا من المناطق الحضرية فى مصر طبقا لنتائج الدراسات والبحوث.", ans: false },
    { q: "المشكلة السكانية تنشأ عندما تعجز الزيادة في معدلات التنمية الاقتصادية والاجتماعية عن اللحاق بمعدلات الزيادة السكانية.", ans: true },
    { q: "يمكن اعتبار زياده معدلات الجريمة أحد تبعات الزيادة السكانية.", ans: true },
    { q: "للشباب دور هام فى مواجهه مشكله التزايد السكاني خاصة إنهم آباء وأمهات الغد.", ans: true },

// ========== STATE ==========
let currentChapter = 0;
const state = {}; // chapter -> { answered: {qIdx: chosenAnswer}, score }

function initChapter(ci) {
  if (!state[ci]) state[ci] = { answered: {}, score: 0, submitted: false };
}

// ========== RENDER ==========
function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const ci = currentChapter;
  const ch = chapters[ci];
  initChapter(ci);

  const sec = document.createElement('div');
  sec.className = 'chapter-section active';

  // Title
  const titleDiv = document.createElement('div');
  titleDiv.className = 'chapter-title';
  titleDiv.innerHTML = `<span class="badge">فصل ${ci+1}</span><h2>${ch.title}</h2>`;
  sec.appendChild(titleDiv);

  // Score summary (if submitted)
  const st = state[ci];
  const total = ch.questions.length;
  if (st.submitted) {
    const ss = document.createElement('div');
    ss.className = 'score-summary show';
    const pct = Math.round((st.score / total) * 100);
    let grade = pct >= 90 ? 'ممتاز 🌟' : pct >= 75 ? 'جيد جداً 👍' : pct >= 60 ? 'جيد ✓' : 'يحتاج مراجعة 📚';
    ss.innerHTML = `
      <div class="score-big">${st.score} / ${total}</div>
      <div class="score-label">إجاباتك الصحيحة</div>
      <div class="score-grade">${grade} (${pct}%)</div>
    `;
    sec.appendChild(ss);
  }

  // Questions
  ch.questions.forEach((q, qi) => {
    const qtype = ch.type === 'mixed' ? q.type : ch.type;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${ci}-${qi}`;

    if (st.submitted) {
      const answered = st.answered[qi];
      let isCorrect;
      if (qtype === 'tf') isCorrect = answered === q.ans;
      else isCorrect = answered === q.ans;
      if (answered !== undefined) card.classList.add(isCorrect ? 'correct' : 'wrong');
    }

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'q-header';
    hdr.innerHTML = `<div class="q-num">${qi+1}</div><div class="q-text">${q.q}</div>`;
    card.appendChild(hdr);

    if (qtype === 'tf') {
      const opts = document.createElement('div');
      opts.className = 'tf-options';
      [{label:'✓ صحيحة', val:true},{label:'✗ خاطئة', val:false}].forEach(({label, val}) => {
        const btn = document.createElement('button');
        btn.className = 'tf-btn';
        btn.textContent = label;
        btn.dataset.val = val;
        const answered = st.answered[qi];
        if (st.submitted) {
          btn.disabled = true;
          if (answered === val) {
            btn.classList.add(val === q.ans ? 'selected-correct' : 'selected-wrong');
          } else if (val === q.ans) {
            btn.classList.add('show-correct');
          }
        } else {
          if (answered === val) btn.classList.add('selected-correct');
          btn.addEventListener('click', () => selectAnswer(ci, qi, val, 'tf'));
        }
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    } else {
      const opts = document.createElement('div');
      opts.className = 'mcq-options';
      const letters = ['أ', 'ب', 'ج', 'د'];
      q.opts.forEach((opt, oi) => {
        const btn = document.createElement('button');
        btn.className = 'mcq-btn';
        const answered = st.answered[qi];
        if (st.submitted) {
          btn.disabled = true;
          if (answered === oi) {
            btn.classList.add(oi === q.ans ? 'selected-correct' : 'selected-wrong');
          } else if (oi === q.ans) {
            btn.classList.add('show-correct');
          }
        } else {
          if (answered === oi) btn.classList.add('selected-correct');
          btn.addEventListener('click', () => selectAnswer(ci, qi, oi, 'mcq'));
        }
        btn.innerHTML = `<span class="opt-label">${letters[oi]}</span>${opt}`;
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    }

    // Result badge
    if (st.submitted && st.answered[qi] !== undefined) {
      const badge = document.createElement('div');
      const qtype2 = ch.type === 'mixed' ? q.type : ch.type;
      const isCorrect = st.answered[qi] === q.ans;
      badge.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;
      let correctText;
      if (qtype2 === 'tf') {
        correctText = q.ans ? 'صحيحة' : 'خاطئة';
      } else {
        correctText = q.opts[q.ans];
      }
      badge.innerHTML = isCorrect ? `✓ إجابة صحيحة` : `✗ الإجابة الصحيحة: ${correctText}`;
      card.appendChild(badge);
    }

    sec.appendChild(card);
  });

  // Controls
  const ctrl = document.createElement('div');
  ctrl.className = 'chapter-controls';
  const answeredCount = Object.keys(st.answered).length;
  const scoreSpan = document.createElement('span');
  scoreSpan.className = 'chapter-score-mini';
  scoreSpan.textContent = `${answeredCount} / ${total} تم الإجابة`;

  if (!st.submitted) {
    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn-primary';
    submitBtn.textContent = `عرض النتيجة النهائية (${answeredCount}/${total})`;
    submitBtn.id = 'submitBtn';
    submitBtn.addEventListener('click', () => submitChapter(ci));

    const resetBtn = document.createElement('button');
    resetBtn.className = 'btn-secondary';
    resetBtn.textContent = 'إعادة تعيين';
    resetBtn.addEventListener('click', () => resetChapter(ci));

    ctrl.appendChild(scoreSpan);
    ctrl.appendChild(resetBtn);
    ctrl.appendChild(submitBtn);
  } else {
    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn-gold';
    retryBtn.textContent = 'إعادة المحاولة';
    retryBtn.addEventListener('click', () => resetChapter(ci));

    if (ci < chapters.length - 1) {
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary';
      nextBtn.textContent = 'الفصل التالي ←';
      nextBtn.addEventListener('click', () => showChapter(ci + 1));
      ctrl.appendChild(nextBtn);
    }
    ctrl.appendChild(retryBtn);
    ctrl.appendChild(scoreSpan);
  }

  sec.appendChild(ctrl);
  main.appendChild(sec);

  updateProgress();
}

function selectAnswer(ci, qi, val, type) {
  initChapter(ci);
  // Already answered this question — ignore re-clicks
  if (state[ci].answered[qi] !== undefined) return;

  state[ci].answered[qi] = val;

  const ch = chapters[ci];
  const q = ch.questions[qi];
  const correctAns = q.ans;
  const isCorrect = val === correctAns;

  if (isCorrect) state[ci].score++;

  const card = document.getElementById(`q-${ci}-${qi}`);
  if (!card) return;

  // Style the card border
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  // Style buttons
  if (type === 'tf') {
    const btns = card.querySelectorAll('.tf-btn');
    btns.forEach(btn => {
      btn.disabled = true;
      const bv = btn.dataset.val === 'true';
      if (bv === val) {
        btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
      } else if (bv === correctAns) {
        btn.classList.add('show-correct');
      }
    });
  } else {
    const btns = card.querySelectorAll('.mcq-btn');
    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === val) {
        btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
        const lbl = btn.querySelector('.opt-label');
        if (lbl) { lbl.style.background = isCorrect ? 'var(--success)' : 'var(--wrong)'; lbl.style.color='white'; }
      } else if (i === correctAns) {
        btn.classList.add('show-correct');
        const lbl = btn.querySelector('.opt-label');
        if (lbl) { lbl.style.background = 'var(--success)'; lbl.style.color='white'; }
      }
    });
  }

  // Show result badge
  const badge = document.createElement('div');
  badge.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;
  const qtype = ch.type === 'mixed' ? q.type : ch.type;
  let correctText = qtype === 'tf' ? (correctAns ? 'صحيحة ✓' : 'خاطئة ✗') : q.opts[correctAns];
  badge.innerHTML = isCorrect
    ? `✓ إجابة صحيحة!`
    : `✗ خطأ — الإجابة الصحيحة: <strong>${correctText}</strong>`;
  card.appendChild(badge);

  // Update counters
  const total = ch.questions.length;
  const answeredCount = Object.keys(state[ci].answered).length;
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) submitBtn.textContent = `عرض النتيجة النهائية (${answeredCount}/${total})`;
  const scoreSpan = document.querySelector('.chapter-score-mini');
  if (scoreSpan) scoreSpan.textContent = `${answeredCount} / ${total} تم الإجابة`;
  updateProgress();
}

function submitChapter(ci) {
  const ch = chapters[ci];
  const st = state[ci];
  let score = 0;
  ch.questions.forEach((q, qi) => {
    if (st.answered[qi] !== undefined && st.answered[qi] === q.ans) score++;
  });
  st.score = score;
  st.submitted = true;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetChapter(ci) {
  state[ci] = { answered: {}, score: 0, submitted: false };
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ========== SHUFFLE CHAPTER ==========
const SHUFFLE_CI = 7;
let shuffledQuestions = [];

function showChapter(ci) {
  currentChapter = ci;
  document.querySelectorAll('.ch-btn').forEach((b, i) => b.classList.toggle('active', i === ci));
  if (ci === SHUFFLE_CI) {
    if (!shuffledQuestions.length) buildShuffled();
    renderShuffle();
  } else {
    render();
  }
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function updateProgress() {
  let total = 0, answered = 0;
  chapters.forEach((ch, ci) => {
    total += ch.questions.length;
    if (state[ci]) answered += Object.keys(state[ci].answered).length;
  });
  const pct = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
}

function buildShuffled() {
  const pool = [];
  const shortTitles = ['الزيادة السكانية','حقوق الإنسان','مكافحة الفساد','سماحة الأديان','حماية البيئة','البيئة MCQ','الكوارث'];
  chapters.forEach((ch, ci) => {
    ch.questions.forEach((q, qi) => {
      const qtype = ch.type === 'mixed' ? q.type : ch.type;
      pool.push({ q, qtype, sourceTitle: shortTitles[ci], origCi: ci, origQi: qi });
    });
  });
  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  shuffledQuestions = pool;
  state[SHUFFLE_CI] = { answered: {}, score: 0, submitted: false };
}

function renderShuffle() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const st = state[SHUFFLE_CI];
  const total = shuffledQuestions.length;
  const answeredCount = Object.keys(st.answered).length;

  const sec = document.createElement('div');
  sec.className = 'chapter-section active';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'shuffle-header';
  hdr.innerHTML = `
    <div class="shuffle-header-text">
      <h2>🔀 كل الأسئلة مخلوطة</h2>
      <p>${total} سؤال من جميع الفصول — ${answeredCount} تم الإجابة — ${st.score} صحيحة</p>
    </div>
    <button class="btn-reshuffle" onclick="reshuffleAll()">🔀 خلط من جديد</button>
  `;
  sec.appendChild(hdr);

  shuffledQuestions.forEach((item, qi) => {
    const { q, qtype, sourceTitle } = item;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${SHUFFLE_CI}-${qi}`;

    const answered = st.answered[qi];
    if (answered !== undefined) {
      card.classList.add(answered === q.ans ? 'correct' : 'wrong');
    }

    // Header row
    const qhdr = document.createElement('div');
    qhdr.className = 'q-header';
    qhdr.innerHTML = `<div class="q-num">${qi+1}</div><div class="q-text"><span class="q-source-tag">${sourceTitle}</span>${q.q}</div>`;
    card.appendChild(qhdr);

    if (qtype === 'tf') {
      const opts = document.createElement('div');
      opts.className = 'tf-options';
      [{label:'✓ صحيحة', val:true},{label:'✗ خاطئة', val:false}].forEach(({label, val}) => {
        const btn = document.createElement('button');
        btn.className = 'tf-btn';
        btn.textContent = label;
        btn.dataset.val = val;
        if (answered !== undefined) {
          btn.disabled = true;
          if (val === answered) btn.classList.add(val === q.ans ? 'selected-correct' : 'selected-wrong');
          else if (val === q.ans) btn.classList.add('show-correct');
        } else {
          btn.addEventListener('click', () => selectShuffleAnswer(qi, val, 'tf'));
        }
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    } else {
      const opts = document.createElement('div');
      opts.className = 'mcq-options';
      const letters = ['أ','ب','ج','د'];
      q.opts.forEach((opt, oi) => {
        const btn = document.createElement('button');
        btn.className = 'mcq-btn';
        if (answered !== undefined) {
          btn.disabled = true;
          if (oi === answered) {
            btn.classList.add(oi === q.ans ? 'selected-correct' : 'selected-wrong');
          } else if (oi === q.ans) btn.classList.add('show-correct');
        } else {
          btn.addEventListener('click', () => selectShuffleAnswer(qi, oi, 'mcq'));
        }
        btn.innerHTML = `<span class="opt-label">${letters[oi]}</span>${opt}`;
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    }

    // Result badge if answered
    if (answered !== undefined) {
      const badge = document.createElement('div');
      const isCorrect = answered === q.ans;
      badge.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;
      const correctText = qtype === 'tf' ? (q.ans ? 'صحيحة ✓' : 'خاطئة ✗') : q.opts[q.ans];
      badge.innerHTML = isCorrect ? `✓ إجابة صحيحة!` : `✗ خطأ — الإجابة الصحيحة: <strong>${correctText}</strong>`;
      card.appendChild(badge);
    }

    sec.appendChild(card);
  });

  main.appendChild(sec);
  updateProgress();
}

function selectShuffleAnswer(qi, val, type) {
  const st = state[SHUFFLE_CI];
  if (st.answered[qi] !== undefined) return;

  st.answered[qi] = val;
  const item = shuffledQuestions[qi];
  const { q, qtype } = item;
  const isCorrect = val === q.ans;
  if (isCorrect) st.score++;

  const card = document.getElementById(`q-${SHUFFLE_CI}-${qi}`);
  if (!card) return;
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  if (type === 'tf') {
    card.querySelectorAll('.tf-btn').forEach(btn => {
      btn.disabled = true;
      const bv = btn.dataset.val === 'true';
      if (bv === val) btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
      else if (bv === q.ans) btn.classList.add('show-correct');
    });
  } else {
    card.querySelectorAll('.mcq-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === val) {
        btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
        const lbl = btn.querySelector('.opt-label');
        if (lbl) { lbl.style.background = isCorrect ? 'var(--success)' : 'var(--wrong)'; lbl.style.color='white'; }
      } else if (i === q.ans) {
        btn.classList.add('show-correct');
        const lbl = btn.querySelector('.opt-label');
        if (lbl) { lbl.style.background = 'var(--success)'; lbl.style.color='white'; }
      }
    });
  }

  const badge = document.createElement('div');
  badge.className = `result-badge show ${isCorrect ? 'correct' : 'wrong'}`;
  const correctText = qtype === 'tf' ? (q.ans ? 'صحيحة ✓' : 'خاطئة ✗') : q.opts[q.ans];
  badge.innerHTML = isCorrect ? `✓ إجابة صحيحة!` : `✗ خطأ — الإجابة الصحيحة: <strong>${correctText}</strong>`;
  card.appendChild(badge);

  // update header live
  const total = shuffledQuestions.length;
  const answeredCount = Object.keys(st.answered).length;
  const p = document.querySelector('.shuffle-header-text p');
  if (p) p.textContent = `${total} سؤال من جميع الفصول — ${answeredCount} تم الإجابة — ${st.score} صحيحة`;
  updateProgress();
}

function reshuffleAll() {
  buildShuffled();
  renderShuffle();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ========== INIT ==========
initChapter(0);
render();
</script>
</body>
</html>
